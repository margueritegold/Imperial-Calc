<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Imperial Calc" />
<meta name="theme-color" content="#1E1E1E" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2032%2032%22%3E%3Crect%20x%3D%222%22%20y%3D%226%22%20width%3D%2222%22%20height%3D%2220%22%20rx%3D%224%22%20fill%3D%22%235CDB7A%22/%3E%3Crect%20x%3D%222%22%20y%3D%226%22%20width%3D%2222%22%20height%3D%2220%22%20rx%3D%224%22%20fill%3D%22none%22%20stroke%3D%22%231a3a24%22%20stroke-width%3D%221.5%22/%3E%3Crect%20x%3D%2222%22%20y%3D%2213%22%20width%3D%228%22%20height%3D%226%22%20rx%3D%222%22%20fill%3D%22%23e0e0e0%22/%3E%3Cline%20x1%3D%226%22%20y1%3D%2211%22%20x2%3D%2218%22%20y2%3D%2211%22%20stroke%3D%22%231a3a24%22%20stroke-width%3D%221.5%22%20stroke-linecap%3D%22round%22/%3E%3Cline%20x1%3D%226%22%20y1%3D%2217%22%20x2%3D%2218%22%20y2%3D%2217%22%20stroke%3D%22%231a3a24%22%20stroke-width%3D%221.5%22%20stroke-linecap%3D%22round%22/%3E%3Cline%20x1%3D%226%22%20y1%3D%2223%22%20x2%3D%2218%22%20y2%3D%2223%22%20stroke%3D%22%231a3a24%22%20stroke-width%3D%221.5%22%20stroke-linecap%3D%22round%22/%3E%3C/svg%3E" />
<title>Imperial Calc</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #1E1E1E;
    --surface:     #272727;
    --surface2:    #303030;
    --border:      #3A3A3A;
    --text:        #FFFFFF;
    --text-dim:    #606060;
    --radius:      10px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --green:       #5CDB7A;
    --green-dim:   #1A3324;
    --red:         #D94F4F;
    --red-dim:     #2A1A1A;
    --yellow:      #D4A017;
    --yellow-dim:  #2A2010;
  }

  html, body { height: 100%; overflow-x: hidden; }

  body::before {
    content: ""; position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #141414; color: var(--text);
    display: flex; justify-content: center; align-items: flex-start;
  }

  #app {
    position: relative; z-index: 1;
    width: calc(100% - 32px); max-width: 800px;
    height: calc(100dvh - 40px); max-height: 1000px;
    background: var(--bg);
    display: flex; flex-direction: column;
    box-shadow: 0 0 60px rgba(0,0,0,0.6);
    border: 1px solid var(--border); border-radius: 16px;
    overflow: hidden; margin: 20px auto; min-width: 0;
  }

  @media (max-width: 500px) {
    body { align-items: stretch; }
    #app {
      width: 100%; max-width: 100%; height: 100dvh;
      max-height: none; margin: 0;
      border-radius: 0; border: none; box-shadow: none;
    }
  }

  header {
    padding: 16px 20px 0;
    padding-top: calc(16px + env(safe-area-inset-top, 0px));
  }
  header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }

  main {
    flex: 1; padding: 10px 16px;
    display: flex; flex-direction: column; gap: 6px;
    overflow-y: auto; overflow-x: hidden; min-width: 0;
  }

  /* ── Row ── */
  .row-wrap {
    display: flex; flex-direction: column; gap: 3px;
    animation: slidein 0.18s ease; min-width: 0; overflow: hidden;
  }
  @keyframes slidein {
    from { opacity: 0; transform: translateY(-5px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .row-wrap.dragging         { opacity: 0.4; }
  .row-wrap.drag-over-top    { border-top: 2px solid var(--green); }
  .row-wrap.drag-over-bottom { border-bottom: 2px solid var(--green); }

  .row { display: flex; align-items: center; gap: 6px; min-width: 0; overflow: hidden; }

  /* Paste button */
  .paste-btn {
    width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0;
    background: transparent; border: 1px solid var(--border);
    color: var(--text-dim); font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.12s, border-color 0.12s;
    outline: none; -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .paste-btn:hover  { color: var(--text); border-color: var(--text-dim); }
  .paste-btn:active { color: var(--green); border-color: var(--green); }

  /* Drag handle */
  .drag-handle {
    width: 18px; flex-shrink: 0; cursor: grab; color: var(--text-dim);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; padding: 4px 0; user-select: none;
  }
  .drag-handle:active { cursor: grabbing; }
  .drag-handle span { display: block; width: 12px; height: 2px; background: var(--text-dim); border-radius: 2px; }

  /* ── Op buttons ── */
  .op-btn {
    width: 32px; height: 32px; border-radius: 50%;
    border: 1px solid transparent; background: transparent;
    font-size: 20px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; font-family: monospace;
    color: var(--text-dim);
    outline: none; -webkit-tap-highlight-color: transparent;
    transition: color 0.1s;
  }
  .op-btn:focus { outline: none; }
  .op-btn.active-add  { color: var(--green); }
  .op-btn.active-sub  { color: var(--red); }
  .op-btn.active-mult { color: var(--green); }
  .op-btn.active-div  { color: var(--yellow); }

  .row-btns { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }

  /* Clear button */
  .del-btn {
    background: transparent; border: 1px solid var(--border); border-radius: 8px;
    color: var(--text-dim); font-size: 16px; padding: 6px 12px;
    cursor: pointer; flex-shrink: 0; white-space: nowrap; font-family: inherit;
    transition: color 0.12s, border-color 0.12s; user-select: none; margin-left: 4px;
    outline: none; -webkit-tap-highlight-color: transparent;
  }
  .del-btn:hover  { color: var(--red); border-color: var(--red); }
  .del-btn:active { color: var(--red); border-color: var(--red); }

  /* ── Measurement boxes ── */
  .meas-group { flex: 1; display: flex; align-items: center; gap: 6px; min-width: 0; }
  .ft-wrap { flex: 1; display: flex; justify-content: flex-end; }
  .in-wrap { flex: 1; display: flex; justify-content: flex-start; }

  .meas-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    padding: 0 10px; height: 48px; gap: 4px; min-width: 0;
  }
  .meas-box.is-sub { border-color: #6A2A2A; }

  .meas-box input {
    background: transparent; border: none; outline: none;
    color: var(--text); font-size: 20px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-weight: 500; text-align: center;
    -webkit-appearance: none; appearance: none;
    width: 2ch; min-width: 1ch; max-width: 20ch; transition: width 0.1s;
  }
  .meas-box input::placeholder { color: var(--text-dim); }

  .unit-label {
    color: var(--text-dim); font-size: 20px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    flex-shrink: 0; user-select: none; line-height: 1;
  }
  .dash-sep {
    color: var(--text-dim); font-size: 20px;
    font-family: monospace; flex-shrink: 0; user-select: none;
  }

  /* ── Factor sub-row ── */
  .factor-row { display: flex; align-items: center; gap: 6px; padding-left: 24px; }
  .factor-op-label { font-size: 20px; font-family: monospace; flex-shrink: 0; width: 22px; text-align: center; }
  .factor-input-wrap {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; height: 36px;
    display: flex; align-items: center; padding: 0 10px;
  }
  .factor-input {
    background: transparent; border: none; outline: none;
    color: var(--text); font-size: 20px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-weight: 500; width: 100%;
    -webkit-appearance: none; appearance: none;
  }
  .factor-input::placeholder { color: var(--text-dim); }
  .row-result { font-size: 13px; color: var(--text-dim); font-family: 'SF Mono', 'Fira Code', monospace; white-space: nowrap; }

  /* ── Add row button ── */
  .add-row-btn {
    width: 100%; height: 46px;
    background: var(--green-dim); border: 1px dashed #2A5A3A;
    border-radius: var(--radius); color: var(--green); font-size: 20px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    margin-top: 4px; font-family: inherit; outline: none;
    transition: background 0.12s, border-color 0.12s;
  }
  .add-row-btn:active { background: #1e3d2a; border-color: var(--green); }

  /* ── Footer ── */
  footer {
    padding: 12px 20px; padding-bottom: calc(14px + var(--safe-bottom));
    background: var(--surface); border-top: 1px solid var(--border);
  }
  .result-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); margin-bottom: 8px; }
  .result-meas-group { display: flex; align-items: center; gap: 6px; }
  .result-wrap-ft { flex: 1; display: flex; justify-content: flex-end; }
  .result-wrap-in { flex: 1; display: flex; justify-content: flex-start; }
  .result-box {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius);
    display: inline-flex; align-items: center; justify-content: center;
    padding: 0 10px; height: 48px; gap: 4px;
  }
  .result-val { font-size: 20px; font-weight: 500; font-family: 'SF Mono', 'Fira Code', monospace; color: var(--text); letter-spacing: -0.5px; }
  .result-val.empty    { color: var(--text-dim); }
  .result-val.negative { color: var(--red); }
  .result-unit { font-size: 20px; color: var(--text-dim); font-family: 'SF Mono', 'Fira Code', monospace; }
  .result-dash { font-size: 20px; color: var(--text-dim); font-family: monospace; flex-shrink: 0; }
  .result-dec-wrap { margin-left: 8px; }
  .result-dec { font-size: 11px; color: var(--text-dim); font-family: 'SF Mono', 'Fira Code', monospace; line-height: 1.6; white-space: pre; }

  .footer-btns { display: flex; gap: 8px; margin-top: 9px; }
  .footer-btn {
    flex: 1; font-size: 16px; padding: 6px 12px; border-radius: 8px;
    cursor: pointer; font-family: inherit; outline: none;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
    -webkit-tap-highlight-color: transparent;
  }
  .footer-btn.copy  { background: var(--green-dim); border: 1px solid var(--green); color: var(--green); }
  .footer-btn.copy:active, .footer-btn.copy.copied { background: var(--green); color: var(--green-dim); }
  .footer-btn.clear { background: var(--red-dim); border: 1px solid #5A2A2A; color: #C06060; }
  .footer-btn.clear:active { background: #3A2020; color: var(--red); }

  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
</style>
</head>
<body>
<div id="app">
  <header><h1>Imperial Calc</h1></header>
  <main id="rows-container"></main>
  <footer>
    <div class="result-label">Total</div>
    <div class="result-meas-group">
      <div class="result-wrap-ft">
        <div class="result-box">
          <span class="result-val empty" id="result-ft">0</span>
          <span class="result-unit">'</span>
        </div>
      </div>
      <span class="result-dash">-</span>
      <div class="result-wrap-in">
        <div class="result-box">
          <span class="result-val empty" id="result-in">0</span>
          <span class="result-unit">"</span>
        </div>
      </div>
      <div class="result-dec-wrap">
        <div class="result-dec" id="result-dec"></div>
      </div>
    </div>
    <div class="footer-btns">
      <button class="footer-btn copy" id="copy-btn" onclick="copyTotal()">Copy total</button>
      <button class="footer-btn clear" onclick="clearAll()">Clear all</button>
    </div>
  </footer>
</div>

<script>
// ─────────────────────────────────────────────
// Constants
// ─────────────────────────────────────────────
const FRACS = ['0','1/16','1/8','3/16','1/4','5/16','3/8','7/16','1/2','9/16','5/8','11/16','3/4','13/16','7/8','15/16'];
const FRAC_VALS = {
  '0':0,'1/16':1/16,'1/8':1/8,'3/16':3/16,'1/4':1/4,'5/16':5/16,
  '3/8':3/8,'7/16':7/16,'1/2':0.5,'9/16':9/16,'5/8':5/8,'11/16':11/16,
  '3/4':3/4,'13/16':13/16,'7/8':7/8,'15/16':15/16
};

// ─────────────────────────────────────────────
// State
// Each row: { ft: number|'', inchRaw: string, inchVal: number, op: 'add'|'sub'|'mult'|'div', factor: number|'' }
// op='add'  → row contributes +inches
// op='sub'  → row contributes -inches
// op='mult' → row inches × factor
// op='div'  → row inches ÷ factor
// ─────────────────────────────────────────────
function newRow(op = 'add') {
  return { ft: '', inchRaw: '', inchVal: 0, op, factor: '' };
}
let rows = [newRow('add')];

// ─────────────────────────────────────────────
// Math helpers
// ─────────────────────────────────────────────
function parseInch(raw) {
  const s = raw.trim();
  if (!s) return null;
  if (/^\d+(\.\d+)?$/.test(s)) return parseFloat(s);
  const pf = s.match(/^(\d+)\/(\d+)$/);
  if (pf) return parseInt(pf[1]) / parseInt(pf[2]);
  const wf = s.match(/^(\d+)[\s\-]+(\d+)\/(\d+)$/);
  if (wf) return parseInt(wf[1]) + parseInt(wf[2]) / parseInt(wf[3]);
  return null;
}

function snapFrac(fp) {
  let best = '0', diff = Infinity;
  FRACS.forEach(f => { const d = Math.abs(FRAC_VALS[f] - fp); if (d < diff) { diff = d; best = f; } });
  return best;
}

function prettyInch(val) {
  if (!val) return '';
  const w = Math.floor(val), f = snapFrac(val - w);
  if (f === '0') return String(w);
  if (w === 0)   return f;
  return `${w} ${f}`;
}

function inchesToDisplay(inches) {
  const neg = inches < 0, abs = Math.abs(inches);
  const ft = Math.floor(abs / 12), rem = abs - ft * 12;
  const wi = Math.floor(rem), frac = snapFrac(rem - wi);
  return `${neg ? '−' : ''}${ft}'-${wi}${frac === '0' ? '' : ' ' + frac}"`;
}

// Compute this row's contribution in inches (always positive; sign applied in calc)
function rowContribution(r) {
  const base = (parseFloat(r.ft) || 0) * 12 + (r.inchVal || 0);
  const f = parseFloat(r.factor);
  if (r.op === 'mult' && !isNaN(f) && f !== 0) return base * f;
  if (r.op === 'div'  && !isNaN(f) && f !== 0) return base / f;
  return base;
}

// ─────────────────────────────────────────────
// Input sizing
// ─────────────────────────────────────────────
function sizeInput(el) {
  const val = el.value || el.placeholder || '0';
  el.style.width = Math.max(1, val.length + 0.5) + 'ch';
}
function sizeAllInputs() {
  document.querySelectorAll('.ft-input, .inch-input, .factor-input').forEach(sizeInput);
}

// ─────────────────────────────────────────────
// Row operations
// ─────────────────────────────────────────────
function rowHasValue(r) {
  return r.ft !== '' || r.inchRaw !== '';
}

function addRowAndFocus(op = 'add', afterIndex = null) {
  const insertAt = afterIndex !== null ? afterIndex + 1 : rows.length;
  rows.splice(insertAt, 0, newRow(op));
  render();
  setTimeout(() => {
    const fi = document.querySelectorAll('.ft-input');
    if (fi[insertAt]) fi[insertAt].focus();
  }, 30);
}

function removeRow(i) {
  if (rows.length === 1) { rows[0] = newRow('add'); render(); return; }
  rows.splice(i, 1);
  render();
}

function clearAll() {
  rows = [newRow('add')];
  render();
}

function rowIsEmpty(r) {
  return !r.ft && !r.inchRaw && !r.inchVal;
}

function setOp(i, op) {
  const isLast = i === rows.length - 1;
  const hasValue = !rowIsEmpty(rows[i]);

  if (op === 'mult' || op === 'div') {
    // Always update in place for mult/div
    rows[i].op = op;
    rows[i].factor = '';
    // Purge any empty rows that aren't this one
    rows = rows.filter((r, idx) => idx === i || !rowIsEmpty(r));
    const newI = rows.indexOf(rows.find((r, idx) => idx === i) || rows[i]);
    render();
    setTimeout(() => {
      const fi = document.querySelectorAll('.factor-input');
      if (fi[i]) fi[i].focus();
    }, 30);
  } else {
    // + or −: if this row already has a value and it's the last row, add a new row
    // Otherwise just update this row's op in place
    if (hasValue && isLast) {
      rows = rows.filter(r => !rowIsEmpty(r));
      if (rows.length === 0) rows = [newRow('add')];
      addRowAndFocus(op, rows.length - 1);
    } else {
      // Update in place — don't add a new row
      rows[i].op = op;
      // Purge any empty rows that aren't this one
      rows = rows.filter((r, idx) => idx === i || !rowIsEmpty(r));
      render();
    }
  }
}

function commitInch(i, inchInput) {
  const parsed = parseInch(inchInput.value);
  if (parsed !== null) {
    const extraFt = Math.floor(parsed / 12);
    const remIn   = parsed - extraFt * 12;
    if (extraFt > 0) {
      rows[i].ft = (parseInt(rows[i].ft) || 0) + extraFt;
      const ftInput = inchInput.closest('.meas-group')?.querySelector('.ft-input');
      if (ftInput) { ftInput.value = rows[i].ft; sizeInput(ftInput); }
    }
    rows[i].inchVal  = remIn;
    rows[i].inchRaw  = prettyInch(remIn);
    inchInput.value  = rows[i].inchRaw;
    sizeInput(inchInput);
  } else {
    rows[i].inchVal = 0;
    rows[i].inchRaw = inchInput.value;
  }
  calc();
}

function focusRowFt(idx) {
  const fi = document.querySelectorAll('.ft-input');
  if (fi[idx]) fi[idx].focus();
}

// ─────────────────────────────────────────────
// Op button helper (defined once, outside render)
// ─────────────────────────────────────────────
function makeOpBtn(label, isActive, activeClass, onClick) {
  const btn = document.createElement('button');
  btn.className = 'op-btn';
  if (isActive) btn.classList.add(activeClass);
  btn.textContent = label;
  btn.addEventListener('click', e => { e.currentTarget.blur(); onClick(); });
  return btn;
}

// ─────────────────────────────────────────────
// Paste parser
// ─────────────────────────────────────────────
function applyPaste(i, raw) {
  // Strip smart quotes
  const clean = raw.replace(/[“”‘’]/g, '');
  // Try full measurement: 1'-3 3/4" or 6-7 1/2
  const m = clean.match(/^(\d+)\s*['\-]\s*(.+)/);
  if (m) {
    const ftPart = parseInt(m[1]) || 0;
    const inPart = m[2].replace(/['"]/g, '').trim();
    const pin = parseInch(inPart);
    if (pin !== null) {
      const ef = Math.floor(pin / 12);
      rows[i].ft = ftPart + ef;
      rows[i].inchVal = pin - ef * 12;
      rows[i].inchRaw = prettyInch(rows[i].inchVal);
      render(); calc(); return;
    }
  }
  // Try just inches
  const inOnly = clean.replace(/['"]/g, '').trim();
  const pin2 = parseInch(inOnly);
  if (pin2 !== null) {
    const ef = Math.floor(pin2 / 12);
    rows[i].ft = (parseInt(rows[i].ft) || 0) + ef;
    rows[i].inchVal = pin2 - ef * 12;
    rows[i].inchRaw = prettyInch(rows[i].inchVal);
    render(); calc(); return;
  }
  // Try just feet
  const ftOnly = parseInt(clean.replace(/[^0-9]/g, ''));
  if (!isNaN(ftOnly)) { rows[i].ft = ftOnly; render(); calc(); }
}

// ─────────────────────────────────────────────
// Render
// ─────────────────────────────────────────────
function render() {
  const container = document.getElementById('rows-container');
  container.innerHTML = '';

  rows.forEach((r, i) => {
    const isSub  = r.op === 'sub';
    const isMult = r.op === 'mult';
    const isDiv  = r.op === 'div';

    // ── Row wrapper (drag target) ──
    const wrap = document.createElement('div');
    wrap.className = 'row-wrap';
    wrap.setAttribute('draggable', 'true');
    wrap.dataset.index = i;

    wrap.addEventListener('dragstart', e => {
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', String(i));
      setTimeout(() => wrap.classList.add('dragging'), 0);
    });
    wrap.addEventListener('dragend', () => {
      document.querySelectorAll('.row-wrap').forEach(el =>
        el.classList.remove('dragging', 'drag-over-top', 'drag-over-bottom')
      );
    });
    wrap.addEventListener('dragover', e => {
      e.preventDefault(); e.dataTransfer.dropEffect = 'move';
      const rect = wrap.getBoundingClientRect();
      document.querySelectorAll('.row-wrap').forEach(el =>
        el.classList.remove('drag-over-top', 'drag-over-bottom')
      );
      wrap.classList.add(e.clientY < rect.top + rect.height / 2 ? 'drag-over-top' : 'drag-over-bottom');
    });
    wrap.addEventListener('dragleave', () => wrap.classList.remove('drag-over-top', 'drag-over-bottom'));
    wrap.addEventListener('drop', e => {
      e.preventDefault();
      const fromIdx  = parseInt(e.dataTransfer.getData('text/plain'));
      const rect     = wrap.getBoundingClientRect();
      const toIdx    = e.clientY < rect.top + rect.height / 2 ? i : i + 1;
      if (fromIdx === toIdx || fromIdx + 1 === toIdx) { render(); return; }
      const moved    = rows.splice(fromIdx, 1)[0];
      rows.splice(toIdx > fromIdx ? toIdx - 1 : toIdx, 0, moved);
      render();
    });

    // ── Main measurement row ──
    const div = document.createElement('div');
    div.className = 'row';

    // Drag handle
    const dh = document.createElement('div');
    dh.className = 'drag-handle';
    dh.innerHTML = '<span></span><span></span><span></span>';
    div.appendChild(dh);

    // Paste button
    const pasteBtn = document.createElement('button');
    pasteBtn.className = 'paste-btn';
    pasteBtn.title = 'Paste measurement';
    pasteBtn.textContent = '⎋';
    pasteBtn.addEventListener('click', async function(e) {
      e.currentTarget.blur();
      try {
        const raw = await navigator.clipboard.readText();
        if (raw && raw.trim()) { applyPaste(i, raw.trim()); return; }
      } catch(_) {}
      // Fallback: focus a hidden textarea and let the user Ctrl+V / Cmd+V
      const ta = document.createElement('textarea');
      ta.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:1px;height:1px;opacity:0.01;border:none;';
      ta.placeholder = '';
      document.body.appendChild(ta);
      ta.focus();
      pasteBtn.textContent = 'Cmd+V';
      pasteBtn.style.color = 'var(--green)';
      ta.addEventListener('input', function() {
        const raw = ta.value.trim();
        document.body.removeChild(ta);
        pasteBtn.textContent = '\u238b';
        pasteBtn.style.color = '';
        if (raw) applyPaste(i, raw);
      }, { once: true });
      setTimeout(() => {
        if (document.body.contains(ta)) {
          document.body.removeChild(ta);
          pasteBtn.textContent = '\u238b';
          pasteBtn.style.color = '';
        }
      }, 5000);
    });
    div.appendChild(pasteBtn);

    // Measurement group
    const measGroup = document.createElement('div');
    measGroup.className = 'meas-group';

    // ── Feet box ──
    const ftBox = document.createElement('div');
    ftBox.className = 'meas-box' + (isSub ? ' is-sub' : '');

    const ftIn = document.createElement('input');
    ftIn.type = 'text'; ftIn.className = 'ft-input';
    ftIn.inputMode = 'numeric'; ftIn.placeholder = '0';
    if (r.ft !== '') ftIn.value = r.ft;

    ftIn.addEventListener('input', () => {
      const raw = ftIn.value;
      // Check if it looks like a full measurement pasted in
      const m = raw.replace(/[“”‘’]/g, '').match(/^(\d+)\s*['\-]\s*(.+)/);
      if (m && m[2]) {
        const inPart = m[2].replace(/['"]/g, '').trim();
        const pin = parseInch(inPart);
        if (pin !== null) {
          const ef = Math.floor(pin / 12);
          rows[i].ft = (parseInt(m[1]) || 0) + ef;
          rows[i].inchVal = pin - ef * 12;
          rows[i].inchRaw = prettyInch(rows[i].inchVal);
          ftIn.value = rows[i].ft;
          sizeInput(ftIn);
          const ii = document.querySelectorAll('.inch-input');
          if (ii[i]) { ii[i].value = rows[i].inchRaw; sizeInput(ii[i]); }
          calc(); return;
        }
      }
      const v = raw.replace(/[^0-9\-]/g, '').replace(/(.)-/g, '$1');
      ftIn.value = v;
      rows[i].ft = v === '' || v === '-' ? v : (parseInt(v) || 0);
      sizeInput(ftIn); calc();
    });
    ftIn.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); document.querySelectorAll('.inch-input')[i]?.focus(); }
    });
    ftIn.addEventListener('paste', e => {
      e.preventDefault();
      const raw = (e.clipboardData || window.clipboardData).getData('text').trim();
      const m = raw.match(/^(\d+)\s*['''\u2019\-]\s*(.+)/);
      if (m) {
        const ftPart   = parseInt(m[1]) || 0;
        const inPart   = m[2].replace(/["""'''\u201c\u201d\u2018\u2019]/g, '').trim();
        const parsedIn = parseInch(inPart);
        if (parsedIn !== null) {
          const extraFt = Math.floor(parsedIn / 12);
          rows[i].ft      = ftPart + extraFt;
          rows[i].inchVal = parsedIn - extraFt * 12;
          rows[i].inchRaw = prettyInch(rows[i].inchVal);
          ftIn.value = rows[i].ft; sizeInput(ftIn);
          const ii = document.querySelectorAll('.inch-input');
          if (ii[i]) { ii[i].value = rows[i].inchRaw; sizeInput(ii[i]); ii[i].focus(); }
          calc(); return;
        }
      }
      const ftOnly = parseInt(raw.replace(/[^0-9]/g, ''));
      if (!isNaN(ftOnly)) { rows[i].ft = ftOnly; ftIn.value = ftOnly; sizeInput(ftIn); calc(); }
    });

    ftBox.appendChild(ftIn);
    ftBox.appendChild(Object.assign(document.createElement('span'), { className: 'unit-label', textContent: "'" }));
    const ftWrap = document.createElement('div');
    ftWrap.className = 'ft-wrap'; ftWrap.appendChild(ftBox);
    measGroup.appendChild(ftWrap);

    measGroup.appendChild(Object.assign(document.createElement('span'), { className: 'dash-sep', textContent: '-' }));

    // ── Inches box ──
    const inBox = document.createElement('div');
    inBox.className = 'meas-box' + (isSub ? ' is-sub' : '');

    const inIn = document.createElement('input');
    inIn.type = 'text'; inIn.className = 'inch-input';
    inIn.inputMode = 'decimal'; inIn.placeholder = '0';
    inIn.value = r.inchRaw;

    inIn.addEventListener('input', () => {
      rows[i].inchRaw = inIn.value; sizeInput(inIn);
      const p = parseInch(inIn.value);
      if (p !== null) { rows[i].inchVal = p % 12; calc(); }
    });
    inIn.addEventListener('blur', () => commitInch(i, inIn));
    inIn.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault(); commitInch(i, inIn);
        if (isMult || isDiv) {
          document.querySelectorAll('.factor-input')[i]?.focus(); return;
        }
        if (i === rows.length - 1) addRowAndFocus(); else focusRowFt(i + 1);
      }
    });

    inBox.appendChild(inIn);
    inBox.appendChild(Object.assign(document.createElement('span'), { className: 'unit-label', textContent: '"' }));
    const inWrap = document.createElement('div');
    inWrap.className = 'in-wrap'; inWrap.appendChild(inBox);
    measGroup.appendChild(inWrap);

    div.appendChild(measGroup);

    // ── Op buttons + Clear ──
    const rowBtns = document.createElement('div');
    rowBtns.className = 'row-btns';

    rowBtns.appendChild(makeOpBtn('+', r.op === 'add',  'active-add',  () => setOp(i, 'add')));
    rowBtns.appendChild(makeOpBtn('−', r.op === 'sub',  'active-sub',  () => setOp(i, 'sub')));
    rowBtns.appendChild(makeOpBtn('×', r.op === 'mult', 'active-mult', () => setOp(i, 'mult')));
    rowBtns.appendChild(makeOpBtn('÷', r.op === 'div',  'active-div',  () => setOp(i, 'div')));

    const del = document.createElement('button');
    del.className = 'del-btn'; del.textContent = 'Clear';
    del.addEventListener('click', e => { e.currentTarget.blur(); removeRow(i); });
    rowBtns.appendChild(del);

    div.appendChild(rowBtns);
    wrap.appendChild(div);

    // ── Factor sub-row (mult/div only) ──
    if (isMult || isDiv) {
      const frow = document.createElement('div');
      frow.className = 'factor-row';

      const opLbl = document.createElement('span');
      opLbl.className = 'factor-op-label';
      opLbl.style.color = isMult ? 'var(--green)' : 'var(--yellow)';
      opLbl.textContent = isMult ? '×' : '÷';
      frow.appendChild(opLbl);

      const fwrap = document.createElement('div');
      fwrap.className = 'factor-input-wrap';

      const fInput = document.createElement('input');
      fInput.type = 'text'; fInput.className = 'factor-input';
      fInput.inputMode = 'decimal'; fInput.placeholder = '1';
      if (r.factor !== '' && r.factor !== null) fInput.value = r.factor;
      fInput.addEventListener('input', () => {
        const v = fInput.value.replace(/[^0-9.]/g, '');
        fInput.value = v;
        rows[i].factor = v === '' ? '' : parseFloat(v);
        sizeInput(fInput); calc();
      });
      fInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          e.preventDefault();
          if (i === rows.length - 1) addRowAndFocus(); else focusRowFt(i + 1);
        }
      });
      fwrap.appendChild(fInput);
      frow.appendChild(fwrap);

      const prevEl = document.createElement('span');
      prevEl.className = 'row-result';
      const base = (parseFloat(r.ft) || 0) * 12 + (r.inchVal || 0);
      const f    = parseFloat(r.factor);
      if (base && !isNaN(f) && f !== 0) prevEl.textContent = '= ' + inchesToDisplay(rowContribution(r));
      frow.appendChild(prevEl);

      wrap.appendChild(frow);
    }

    container.appendChild(wrap);
  });

  // Add row button
  const addBtn = document.createElement('button');
  addBtn.className = 'add-row-btn';
  addBtn.textContent = '+ Add measurement';
  addBtn.addEventListener('click', () => addRowAndFocus('add'));
  container.appendChild(addBtn);

  calc();
  setTimeout(sizeAllInputs, 0);
}

// ─────────────────────────────────────────────
// Calc
// ─────────────────────────────────────────────
function calc() {
  let totalInches = 0, hasValue = false;

  rows.forEach(r => {
    const contrib = rowContribution(r);
    if ((parseFloat(r.ft) || 0) + r.inchVal) hasValue = true;
    if      (r.op === 'sub')  totalInches -= contrib;
    else                      totalInches += contrib; // add, mult, div all contribute positively
  });

  const ftEl  = document.getElementById('result-ft');
  const inEl  = document.getElementById('result-in');
  const decEl = document.getElementById('result-dec');

  if (!hasValue) {
    ftEl.textContent = '0'; ftEl.className = 'result-val empty';
    inEl.textContent = '0'; inEl.className = 'result-val empty';
    decEl.textContent = ''; return;
  }

  const negative = totalInches < 0;
  const abs      = Math.abs(totalInches);
  const ftOut    = Math.floor(abs / 12);
  const remIn    = abs - ftOut * 12;
  const wholeIn  = Math.floor(remIn);
  const bestFrac = snapFrac(remIn - wholeIn);
  const fracStr  = bestFrac === '0' ? '' : ' ' + bestFrac;

  ftEl.textContent  = `${negative ? '−' : ''}${ftOut}`;
  ftEl.className    = 'result-val' + (negative ? ' negative' : '');
  inEl.textContent  = `${wholeIn}${fracStr}`;
  inEl.className    = 'result-val' + (negative ? ' negative' : '');
  decEl.textContent = `${(totalInches / 12).toFixed(4)} ft\n${totalInches.toFixed(4)} in`;
}

// ─────────────────────────────────────────────
// Copy total
// ─────────────────────────────────────────────
function copyTotal() {
  const ft   = document.getElementById('result-ft').textContent;
  const ins  = document.getElementById('result-in').textContent;
  const text = `${ft}'-${ins}"`;
  const btn  = document.getElementById('copy-btn');
  const done = () => {
    btn.textContent = 'Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy total'; btn.classList.remove('copied'); }, 1500);
  };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
  } else {
    fallbackCopy(text, done);
  }
}
function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text; document.body.appendChild(ta); ta.select();
  document.execCommand('copy'); document.body.removeChild(ta); cb();
}

// ─────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────
render();
</script>
</body>
