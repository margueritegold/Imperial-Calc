<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Imperial Calc" />
<meta name="theme-color" content="#1E1E1E" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20viewBox%3D%220%200%2032%2032%22%3E%3Crect%20x%3D%222%22%20y%3D%226%22%20width%3D%2222%22%20height%3D%2220%22%20rx%3D%224%22%20fill%3D%22%235CDB7A%22/%3E%3Crect%20x%3D%222%22%20y%3D%226%22%20width%3D%2222%22%20height%3D%2220%22%20rx%3D%224%22%20fill%3D%22none%22%20stroke%3D%22%231a3a24%22%20stroke-width%3D%221.5%22/%3E%3Crect%20x%3D%2222%22%20y%3D%2213%22%20width%3D%228%22%20height%3D%226%22%20rx%3D%222%22%20fill%3D%22%23e0e0e0%22/%3E%3Cline%20x1%3D%226%22%20y1%3D%2211%22%20x2%3D%2218%22%20y2%3D%2211%22%20stroke%3D%22%231a3a24%22%20stroke-width%3D%221.5%22%20stroke-linecap%3D%22round%22/%3E%3Cline%20x1%3D%226%22%20y1%3D%2217%22%20x2%3D%2218%22%20y2%3D%2217%22%20stroke%3D%22%231a3a24%22%20stroke-width%3D%221.5%22%20stroke-linecap%3D%22round%22/%3E%3Cline%20x1%3D%226%22%20y1%3D%2223%22%20x2%3D%2218%22%20y2%3D%2223%22%20stroke%3D%22%231a3a24%22%20stroke-width%3D%221.5%22%20stroke-linecap%3D%22round%22/%3E%3C/svg%3E" />
<title>Imperial Calc</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1E1E1E;
    --surface: #272727;
    --surface2: #303030;
    --border: #3A3A3A;
    --accent: #5CDB7A;
    --minus: #D94F4F;
    --text: #FFFFFF;
    --text2: #A0A0A0;
    --text3: #606060;
    --radius: 10px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --green: #5CDB7A;
    --green-dim: #1A3324;
    --blue: #5A9ED6;
    --blue-dim: #152535;
    --red-dim: #2A1A1A;
  }
  html, body { height: 100%; overflow-x: hidden; }
  body::before {
    content: "";
    position: fixed; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #141414; color: var(--text);
    display: flex; justify-content: center; align-items: flex-start;
  }
  #app {
    position: relative; z-index: 1;
    width: calc(100% - 32px); max-width: 800px;
    height: calc(100dvh - 40px); max-height: 1000px;
    background: var(--bg);
    display: flex; flex-direction: column;
    box-shadow: 0 0 60px rgba(0,0,0,0.6);
    border: 1px solid #3A3A3A; border-radius: 16px;
    overflow: hidden; margin: 20px auto; min-width: 0;
  }
  @media (max-width: 500px) {
    body { align-items: stretch; }
    #app { width: 100%; max-width: 100%; height: 100dvh; max-height: none; margin: 0; border-radius: 0; border: none; box-shadow: none; }
  }
  header {
    padding: 16px 20px 0;
    padding-top: calc(16px + env(safe-area-inset-top, 0px));
    display: flex; align-items: center;
  }
  header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text); }

  main {
    flex: 1; padding: 10px 16px;
    display: flex; flex-direction: column; gap: 6px;
    overflow-y: auto; overflow-x: hidden; min-width: 0;
  }

  .row-wrap {
    display: flex; flex-direction: column; gap: 3px;
    animation: slidein 0.18s ease; min-width: 0; overflow: hidden;
  }
  @keyframes slidein { from { opacity:0; transform:translateY(-5px); } to { opacity:1; transform:translateY(0); } }

  /* ── Main measurement row ── */
  .row {
    display: flex; align-items: center; gap: 6px;
    min-width: 0; overflow: hidden;
  }

  /* +/− sign button — always visible on every row */
  .sign-btn {
    width: 32px; height: 32px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--surface2);
    font-size: 20px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; color: var(--text3);
    font-family: monospace;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
    user-select: none;
  }
  .sign-btn.plus  { color: var(--green); border-color: var(--green); background: var(--green-dim); }
  .sign-btn.minus { color: var(--minus); border-color: var(--minus); background: var(--red-dim); }

  /* ft - in boxes */
  .meas-group {
    flex: 1; display: flex; align-items: center; gap: 6px; min-width: 0;
  }
  .ft-wrap  { flex: 1; display: flex; justify-content: flex-end; }
  .in-wrap  { flex: 1; display: flex; justify-content: flex-start; }

  .meas-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    padding: 0 10px; height: 48px; gap: 4px;
    transition: border-color 0.15s; min-width: 0;
  }
  .meas-box:focus-within { border-color: var(--accent); }
  .meas-box.minus-row { border-color: #6A2A2A; }
  .meas-box.minus-row:focus-within { border-color: var(--minus); }

  .meas-box input {
    background: transparent; border: none; outline: none;
    color: var(--text); font-size: 20px;
    font-family: 'SF Mono','Fira Code',monospace;
    font-weight: 500; text-align: center;
    -webkit-appearance: none; appearance: none;
    width: 2ch; min-width: 1ch; max-width: 7ch;
    transition: width 0.1s;
  }
  .meas-box input:focus { color: var(--accent); }
  .meas-box.minus-row input:focus { color: var(--minus); }
  .ft-input::placeholder, .inch-input::placeholder { color: var(--text3); }

  .unit-label {
    color: var(--text3); font-size: 20px;
    font-family: 'SF Mono','Fira Code',monospace;
    flex-shrink: 0; user-select: none; line-height: 1;
  }
  .dash-sep {
    color: var(--text3); font-size: 20px; flex-shrink: 0;
    font-family: monospace; user-select: none;
  }

  /* right-side buttons: × (mult) and × (del) — always visible */
  .row-btns {
    display: flex; align-items: center; gap: 5px; flex-shrink: 0;
  }
  .mult-btn {
    width: 32px; height: 32px; border-radius: 50%;
    border: 1px solid #1A3550; background: #152535;
    font-size: 18px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; color: var(--blue);
    font-family: monospace;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
    user-select: none;
  }
  .mult-btn.active-mult { color: var(--accent); border-color: var(--accent); background: var(--green-dim); }
  .mult-btn.active-div  { color: var(--blue); border-color: var(--blue); background: var(--blue-dim); }

  .del-btn {
    width: 32px; height: 32px; border-radius: 50%;
    background: #2A1A1A; border: 1px solid #5A2A2A;
    color: #C06060; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; line-height: 1;
    transition: background 0.12s, color 0.12s;
    user-select: none;
  }
  .del-btn:active { background: #3A2020; color: var(--minus); }

  /* ── Factor sub-row (shown when mult/div active) ── */
  .factor-row {
    display: flex; align-items: center; gap: 6px;
    padding-left: 38px; /* indent past sign-btn */
    padding-right: 70px; /* align with meas-group, before row-btns */
  }
  .factor-op-label {
    font-size: 20px; font-family: monospace;
    flex-shrink: 0; width: 22px; text-align: center;
  }
  .factor-input-wrap {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; height: 36px;
    display: flex; align-items: center; padding: 0 10px;
    transition: border-color 0.15s;
  }
  .factor-input-wrap:focus-within { border-color: var(--accent); }
  .factor-input {
    background: transparent; border: none; outline: none;
    color: var(--text); font-size: 20px;
    font-family: 'SF Mono','Fira Code',monospace;
    font-weight: 500; width: 100%;
    -webkit-appearance: none; appearance: none;
  }
  .factor-input:focus { color: var(--accent); }
  .factor-input::placeholder { color: var(--text3); }
  .row-result {
    font-size: 13px; color: var(--text3);
    font-family: 'SF Mono','Fira Code',monospace;
    white-space: nowrap;
  }

  /* add button */
  .add-btn {
    width: 100%; height: 46px; background: #1A3324;
    border: 1px dashed #2A5A3A; border-radius: var(--radius);
    color: var(--green); font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-top: 4px; transition: background 0.12s, border-color 0.12s;
  }
  .add-btn:active { background: var(--green-dim); border-color: var(--green); }

  footer {
    padding: 12px 20px;
    padding-bottom: calc(14px + var(--safe-bottom));
    background: var(--surface); border-top: 1px solid var(--border);
  }
  .result-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); margin-bottom: 8px; }
  .result-meas-group { display: flex; align-items: center; gap: 6px; }
  .result-wrap-ft { flex: 1; display: flex; justify-content: flex-end; }
  .result-wrap-in { flex: 1; display: flex; justify-content: flex-start; }
  .result-box {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius);
    display: inline-flex; align-items: center; justify-content: center;
    padding: 0 10px; height: 48px; gap: 4px;
  }
  .result-val { font-size: 20px; font-weight: 500; font-family: 'SF Mono','Fira Code',monospace; color: var(--text); letter-spacing: -0.5px; }
  .result-val.empty { color: var(--text3); }
  .result-val.negative { color: var(--minus); }
  .result-unit { font-size: 20px; color: var(--text3); font-family: 'SF Mono','Fira Code',monospace; }
  .result-dash { font-size: 20px; color: var(--text3); font-family: monospace; flex-shrink: 0; }
  .result-dec-wrap { margin-left: 8px; }
  .result-dec { font-size: 11px; color: var(--text3); font-family: 'SF Mono','Fira Code',monospace; line-height: 1.6; white-space: pre; }
  .footer-btns { display: flex; gap: 8px; margin-top: 9px; }
  .clear-btn {
    background: #2A1A1A; border: 1px solid #5A2A2A; border-radius: 8px;
    color: #C06060; font-size: 16px; padding: 6px 12px; cursor: pointer;
    flex: 1; transition: background 0.12s;
  }
  .clear-btn:active { background: #3A2020; color: var(--minus); }
  .copy-btn {
    background: var(--green-dim); border: 1px solid var(--green); border-radius: 8px;
    color: var(--green); font-size: 16px; padding: 6px 16px; cursor: pointer;
    flex: 1; transition: background 0.12s, color 0.12s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .copy-btn:active { background: var(--green); color: #1A3324; }
  .copy-btn.copied { background: var(--green); color: #1A3324; }

  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
</style>
</head>
<body>
<div id="app">
<header><h1>Imperial Calc</h1></header>
<main id="rows-container"></main>
<footer>
  <div class="result-label">Total</div>
  <div class="result-meas-group">
    <div class="result-wrap-ft">
      <div class="result-box">
        <span class="result-val empty" id="result-ft">0</span>
        <span class="result-unit">'</span>
      </div>
    </div>
    <span class="result-dash">-</span>
    <div class="result-wrap-in">
      <div class="result-box">
        <span class="result-val empty" id="result-in">0</span>
        <span class="result-unit">"</span>
      </div>
    </div>
    <div class="result-dec-wrap">
      <div class="result-dec" id="result-dec"></div>
    </div>
  </div>
  <div class="footer-btns">
    <button class="copy-btn" id="copy-btn" onclick="copyTotal()">Copy total</button>
    <button class="clear-btn" onclick="clearAll()">Clear all</button>
  </div>
</footer>
</div>
<script>
const FRACS = ['0','1/16','1/8','3/16','1/4','5/16','3/8','7/16','1/2','9/16','5/8','11/16','3/4','13/16','7/8','15/16'];
const FRAC_VALS = {'0':0,'1/16':1/16,'1/8':1/8,'3/16':3/16,'1/4':1/4,'5/16':5/16,'3/8':3/8,'7/16':7/16,'1/2':0.5,'9/16':9/16,'5/8':5/8,'11/16':11/16,'3/4':3/4,'13/16':13/16,'7/8':7/8,'15/16':15/16};

// row: { ft, inchRaw, inchVal, sign:1|-1, factorOp:null|'mult'|'div', factor:null|number }
let rows = [{ ft:'', inchRaw:'', inchVal:0, sign:1, factorOp:null, factor:null }];

function parseInch(raw) {
  const s = raw.trim(); if (!s) return null;
  if (/^\d+(\.\d+)?$/.test(s)) return parseFloat(s);
  const pf = s.match(/^(\d+)\/(\d+)$/);
  if (pf) return parseInt(pf[1]) / parseInt(pf[2]);
  const wf = s.match(/^(\d+)[\s\-]+(\d+)\/(\d+)$/);
  if (wf) return parseInt(wf[1]) + parseInt(wf[2]) / parseInt(wf[3]);
  return null;
}
function snapFrac(fp) {
  let best='0', diff=Infinity;
  FRACS.forEach(f=>{const d=Math.abs(FRAC_VALS[f]-fp); if(d<diff){diff=d;best=f;}});
  return best;
}
function prettyInch(val) {
  if (!val) return '';
  const w=Math.floor(val), f=snapFrac(val-w);
  if(f==='0') return String(w);
  if(w===0) return f;
  return `${w} ${f}`;
}
function inchesToDisplay(totalIn) {
  const neg=totalIn<0, abs=Math.abs(totalIn);
  const ft=Math.floor(abs/12), rem=abs-ft*12;
  const wi=Math.floor(rem), frac=snapFrac(rem-wi);
  return `${neg?'−':''}${ft}'-${wi}${frac==='0'?'':' '+frac}"`;
}
function rowInches(r) {
  const raw=(parseFloat(r.ft)||0)*12+(r.inchVal||0);
  if (r.factorOp && r.factor) return r.factorOp==='mult' ? raw*r.factor : raw/r.factor;
  return raw;
}

function sizeInput(el) {
  const val = el.value || el.placeholder || '0';
  el.style.width = Math.max(1, Math.min(val.length+0.5, 8))+'ch';
}
function sizeAllInputs() {
  document.querySelectorAll('.ft-input,.inch-input,.factor-input').forEach(sizeInput);
}

function addRowAndFocus() {
  rows.push({ ft:'', inchRaw:'', inchVal:0, sign:1, factorOp:null, factor:null });
  function copyTotal() {
  const ft = document.getElementById('result-ft').textContent;
  const inches = document.getElementById('result-in').textContent;
  const text = ft + "'-" + inches + '"';
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
  }).catch(() => {
    // fallback for older browsers
    const ta = document.createElement('textarea');
    ta.value = ft + "'-" + inches + '"';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy total'; btn.classList.remove('copied'); }, 1500);
  });
}

render();
  setTimeout(()=>{ const fi=document.querySelectorAll('.ft-input'); if(fi.length) fi[fi.length-1].focus(); }, 30);
}
function removeRow(i) { rows.splice(i,1); render(); }
function clearAll() { rows=[{ft:'',inchRaw:'',inchVal:0,sign:1,factorOp:null,factor:null}]; render(); }
function toggleSign(i) { rows[i].sign=rows[i].sign===1?-1:1; render(); }

function toggleFactorOp(i, op) {
  const r = rows[i];
  if (r.factorOp === op) {
    // clicking active op → deactivate
    r.factorOp = null; r.factor = null;
  } else {
    r.factorOp = op;
    if (r.factor === null) r.factor = '';
  }
  render();
  if (r.factorOp) {
    setTimeout(()=>{ const fi=document.querySelectorAll('.factor-input'); if(fi[i]) fi[i].focus(); }, 30);
  }
}

function commitInch(i, inchInput) {
  const parsed=parseInch(inchInput.value);
  if (parsed!==null) {
    const extraFt=Math.floor(parsed/12), remIn=parsed-extraFt*12;
    if (extraFt>0) {
      rows[i].ft=(parseInt(rows[i].ft)||0)+extraFt;
      const ftInput=inchInput.closest('.meas-group')?.querySelector('.ft-input');
      if(ftInput) ftInput.value=rows[i].ft;
    }
    rows[i].inchVal=remIn; rows[i].inchRaw=prettyInch(remIn);
    inchInput.value=rows[i].inchRaw; sizeInput(inchInput);
  } else { rows[i].inchVal=0; rows[i].inchRaw=inchInput.value; }
  calc();
}
function focusRowFt(idx) { const fi=document.querySelectorAll('.ft-input'); if(fi[idx]) fi[idx].focus(); }

function render() {
  const container=document.getElementById('rows-container');
  container.innerHTML='';

  rows.forEach((r,i)=>{
    const wrap=document.createElement('div'); wrap.className='row-wrap';

    // ── Main row ──
    const div=document.createElement('div'); div.className='row';

    // Sign button (every row)
    const signBtn=document.createElement('button');
    signBtn.className='sign-btn '+(r.sign===1?'plus':'minus');
    signBtn.textContent=r.sign===1?'+':'−';
    signBtn.addEventListener('click',()=>toggleSign(i));
    div.appendChild(signBtn);

    // ft - in group
    const measGroup=document.createElement('div'); measGroup.className='meas-group';

    const ftBox=document.createElement('div'); ftBox.className='meas-box'+(r.sign===-1?' minus-row':'');
    const ftIn=document.createElement('input');
    ftIn.type='text'; ftIn.className='ft-input';
    ftIn.inputMode='numeric'; ftIn.placeholder='0';
    if(r.ft!=='') ftIn.value=r.ft;
    ftIn.addEventListener('input',()=>{ const v=ftIn.value.replace(/[^0-9]/g,''); ftIn.value=v; rows[i].ft=v===''?'':(parseInt(v)||0); sizeInput(ftIn); calc(); });
    ftIn.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault(); document.querySelectorAll('.inch-input')[i]?.focus();} });
    ftIn.addEventListener('paste',e=>{
      e.preventDefault();
      const raw=(e.clipboardData||window.clipboardData).getData('text').trim();
      // Match feet-inches: 6'-7 3/32" or 3'-10 1/2" or 6' 7"
      const m = raw.match(/^(\d+)\s*[’‘'\-]\s*(.+)/);
      if (m) {
        const ftPart = parseInt(m[1]) || 0;
        const inPart = m[2].replace(/[“”‘’"']/g,'').trim();
        const parsedIn = parseInch(inPart);
        if (parsedIn !== null) {
          const extraFt = Math.floor(parsedIn / 12);
          const remIn = parsedIn - extraFt * 12;
          rows[i].ft = ftPart + extraFt;
          ftIn.value = rows[i].ft;
          sizeInput(ftIn);
          rows[i].inchVal = remIn;
          rows[i].inchRaw = prettyInch(remIn);
          const ii = document.querySelectorAll('.inch-input');
          if (ii[i]) { ii[i].value = rows[i].inchRaw; sizeInput(ii[i]); ii[i].focus(); }
          calc(); return;
        }
      }
      // fallback: just a number for feet
      const ftOnly = parseInt(raw.replace(/[^0-9]/g,''));
      if (!isNaN(ftOnly)) { rows[i].ft = ftOnly; ftIn.value = ftOnly; sizeInput(ftIn); calc(); }
    });
        ftBox.appendChild(ftIn);
    const ftLbl=document.createElement('span'); ftLbl.className='unit-label'; ftLbl.textContent="'"; ftBox.appendChild(ftLbl);
    const ftWrap=document.createElement('div'); ftWrap.className='ft-wrap'; ftWrap.appendChild(ftBox);
    measGroup.appendChild(ftWrap);

    const dashSep=document.createElement('span'); dashSep.className='dash-sep'; dashSep.textContent='-';
    measGroup.appendChild(dashSep);

    const inBox=document.createElement('div'); inBox.className='meas-box'+(r.sign===-1?' minus-row':'');
    const inIn=document.createElement('input');
    inIn.type='text'; inIn.className='inch-input'; inIn.inputMode='decimal'; inIn.placeholder='0';
    inIn.value=r.inchRaw;
    inIn.addEventListener('input',()=>{ rows[i].inchRaw=inIn.value; sizeInput(inIn); const p=parseInch(inIn.value); if(p!==null){rows[i].inchVal=p%12; calc();} });
    inIn.addEventListener('blur',()=>commitInch(i,inIn));
    inIn.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); commitInch(i,inIn); if(r.factorOp){ document.querySelectorAll('.factor-input')[i]?.focus(); return; } if(i===rows.length-1) addRowAndFocus(); else focusRowFt(i+1); } });
    inBox.appendChild(inIn);
    const inLbl=document.createElement('span'); inLbl.className='unit-label'; inLbl.textContent='"'; inBox.appendChild(inLbl);
    const inWrap=document.createElement('div'); inWrap.className='in-wrap'; inWrap.appendChild(inBox);
    measGroup.appendChild(inWrap);

    div.appendChild(measGroup);

    // Right buttons: × (mult) | ÷ (div) | × (del)
    const rowBtns=document.createElement('div'); rowBtns.className='row-btns';

    const multBtn=document.createElement('button');
    multBtn.className='mult-btn'+(r.factorOp==='mult'?' active-mult':r.factorOp==='div'?' active-div':'');
    multBtn.textContent=r.factorOp==='div'?'÷':'×';
    multBtn.setAttribute('aria-label','Multiply');
    multBtn.addEventListener('click',()=>toggleFactorOp(i,'mult'));
    rowBtns.appendChild(multBtn);

    const divBtn=document.createElement('button');
    divBtn.className='mult-btn'+(r.factorOp==='div'?' active-div':'');
    divBtn.textContent='÷';
    divBtn.setAttribute('aria-label','Divide');
    divBtn.addEventListener('click',()=>toggleFactorOp(i,'div'));
    rowBtns.appendChild(divBtn);

    const del=document.createElement('button');
    del.className='del-btn'; del.innerHTML='&times;'; del.setAttribute('aria-label','Remove row');
    del.addEventListener('click',()=>removeRow(i));
    rowBtns.appendChild(del);

    div.appendChild(rowBtns);
    wrap.appendChild(div);

    // ── Factor sub-row (visible when mult or div active) ──
    if (r.factorOp) {
      const frow=document.createElement('div'); frow.className='factor-row';

      const opLbl=document.createElement('span'); opLbl.className='factor-op-label';
      opLbl.style.color=r.factorOp==='mult'?'var(--accent)':'var(--blue)';
      opLbl.textContent=r.factorOp==='mult'?'×':'÷';
      frow.appendChild(opLbl);

      const fwrap=document.createElement('div'); fwrap.className='factor-input-wrap';
      const fInput=document.createElement('input');
      fInput.type='number'; fInput.className='factor-input';
      fInput.inputMode='decimal'; fInput.placeholder='1'; fInput.min='0';
      if(r.factor!==''&&r.factor!==null) fInput.value=r.factor;
      fInput.addEventListener('input',()=>{ rows[i].factor=fInput.value===''?'':parseFloat(fInput.value); sizeInput(fInput); calc(); });
      fInput.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault(); if(i===rows.length-1) addRowAndFocus(); else focusRowFt(i+1);} });
      fwrap.appendChild(fInput);
      frow.appendChild(fwrap);

      const prevEl=document.createElement('span'); prevEl.className='row-result';
      const base=(parseFloat(r.ft)||0)*12+(r.inchVal||0);
      if(base&&r.factor) prevEl.textContent='= '+inchesToDisplay(rowInches(r));
      frow.appendChild(prevEl);

      wrap.appendChild(frow);
    }

    container.appendChild(wrap);
  });

  const addBtn=document.createElement('button'); addBtn.className='add-btn';
  addBtn.textContent='+ Add measurement';
  addBtn.addEventListener('click',addRowAndFocus);
  container.appendChild(addBtn);

  calc();
  setTimeout(sizeAllInputs,0);
}

function calc() {
  let totalInches=0, hasValue=false;
  rows.forEach(r=>{ const base=(parseFloat(r.ft)||0)*12+(r.inchVal||0); if(base) hasValue=true; totalInches+=r.sign*rowInches(r); });

  const ftEl=document.getElementById('result-ft');
  const inEl=document.getElementById('result-in');
  const decEl=document.getElementById('result-dec');

  if(!hasValue){ ftEl.textContent='0'; ftEl.className='result-val empty'; inEl.textContent='0'; inEl.className='result-val empty'; decEl.textContent=''; return; }

  const negative=totalInches<0, abs=Math.abs(totalInches);
  const ftOut=Math.floor(abs/12), remIn=abs-ftOut*12;
  const wholeIn=Math.floor(remIn), bestFrac=snapFrac(remIn-wholeIn);
  const fracStr=bestFrac==='0'?'':' '+bestFrac;

  ftEl.textContent=`${negative?'−':''}${ftOut}`; ftEl.className='result-val'+(negative?' negative':'');
  inEl.textContent=`${wholeIn}${fracStr}`; inEl.className='result-val'+(negative?' negative':'');
  decEl.textContent=`${(totalInches/12).toFixed(4)} ft\n${totalInches.toFixed(4)} in`;
}

// Fix mult-btn click — simplify: one listener per button
render();
</script>
</body>
</html>
